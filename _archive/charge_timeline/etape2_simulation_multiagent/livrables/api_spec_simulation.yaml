openapi: 3.1.0
info:
  title: LIA Simulation Multi-Agent Service
  version: v0.1.0
  description: >-
    Service d'orchestration pour simulations multi-agents permettant à LIA
    de discuter avec d'autres agents (LIA, LLM externes, agents simulés).
servers:
  - url: http://127.0.0.1:4700
    description: Instance locale (dev)
security:
  - ApiToken: []
paths:
  /simulation/start:
    post:
      summary: Démarre une nouvelle simulation multi-agent
      operationId: startSimulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulationStartRequest'
            examples:
              deux_agents_lia:
                summary: Simulation LIA ↔ LIA
                value:
                  agent_configs:
                    - agent_id: lia-primary
                      agent_type: lia-primary
                      capabilities: [memory, governance]
                    - agent_id: lia-secondary
                      agent_type: lia-secondary
                      capabilities: [memory]
                  scenario: "philosophy"
                  max_turns: 20
                  timeout_seconds: 30
      responses:
        "201":
          description: Simulation démarrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationStartResponse'
        "400":
          description: Configuration invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /simulation/{session_id}/message:
    post:
      summary: Envoie un message dans une simulation active
      operationId: sendMessage
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageRequest'
      responses:
        "200":
          description: Message traité et réponse reçue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "404":
          description: Session introuvable
        "409":
          description: Simulation terminée ou en erreur
  /simulation/{session_id}/status:
    get:
      summary: Récupère le statut d'une simulation
      operationId: getSimulationStatus
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Statut de la simulation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationStatus'
        "404":
          description: Session introuvable
  /simulation/{session_id}/stop:
    post:
      summary: Arrête une simulation et finalise la journalisation
      operationId: stopSimulation
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Simulation arrêtée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationStopResponse'
        "404":
          description: Session introuvable
  /simulation/{session_id}/export:
    get:
      summary: Exporte les résultats d'une simulation
      operationId: exportSimulation
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        "200":
          description: Résultats exportés
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationExport'
components:
  securitySchemes:
    ApiToken:
      type: apiKey
      in: header
      name: X-LIA-Token
  schemas:
    SimulationStartRequest:
      type: object
      required: [agent_configs]
      properties:
        agent_configs:
          type: array
          minItems: 2
          maxItems: 10
          items:
            $ref: '#/components/schemas/AgentConfig'
        scenario:
          type: string
          description: Scénario prédéfini (ex: "philosophy", "problem-solving")
        max_turns:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
        timeout_seconds:
          type: integer
          minimum: 5
          maximum: 300
          default: 30
    AgentConfig:
      type: object
      required: [agent_id, agent_type]
      properties:
        agent_id:
          type: string
        agent_type:
          type: string
          enum: [lia-primary, lia-secondary, llm-external, simulated]
        capabilities:
          type: array
          items:
            type: string
        api_endpoint:
          type: string
          format: uri
        auth_token:
          type: string
    SimulationStartResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
          enum: [running, starting]
        agents:
          type: array
          items:
            type: string
        started_at:
          type: string
          format: date-time
    MessageRequest:
      type: object
      required: [agent_id, content]
      properties:
        agent_id:
          type: string
        content:
          type: string
        metadata:
          type: object
    MessageResponse:
      type: object
      properties:
        message_id:
          type: string
        response_content:
          type: string
        response_agent_id:
          type: string
        turn:
          type: integer
        governance_verdict:
          type: string
          enum: [allow, warn, block]
    SimulationStatus:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
          enum: [running, stopped, failed, completed]
        current_turn:
          type: integer
        max_turns:
          type: integer
        messages_count:
          type: integer
        agents:
          type: array
          items:
            type: string
        metrics:
          $ref: '#/components/schemas/BehavioralMetrics'
        started_at:
          type: string
          format: date-time
        last_activity:
          type: string
          format: date-time
    BehavioralMetrics:
      type: object
      properties:
        variability:
          type: number
          minimum: 0
          maximum: 1
        autonomy:
          type: number
          minimum: 0
          maximum: 1
        curiosity:
          type: number
          minimum: 0
          maximum: 1
        coherence:
          type: number
          minimum: 0
          maximum: 1
    SimulationStopResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
        stopped_at:
          type: string
          format: date-time
        final_metrics:
          $ref: '#/components/schemas/BehavioralMetrics'
        experience_id:
          type: string
    SimulationExport:
      type: object
      properties:
        session_id:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        agents:
          type: array
          items:
            type: string
        total_turns:
          type: integer
        metrics:
          $ref: '#/components/schemas/BehavioralMetrics'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/MultiAgentMessage'
        experiences_created:
          type: array
          items:
            type: string
        traits_updated:
          type: array
          items:
            type: string
    MultiAgentMessage:
      type: object
      properties:
        message_id:
          type: string
        session_id:
          type: string
        agent_id:
          type: string
        agent_partner_id:
          type: string
        timestamp:
          type: string
          format: date-time
        message_type:
          type: string
        content:
          type: string
        metadata:
          type: object
    ErrorResponse:
      type: object
      properties:
        error_code:
          type: string
        message:
          type: string
        context:
          type: object




